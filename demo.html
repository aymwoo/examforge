      function StudyPlan() {
        const [examType, setExamType] = useState("Competitive Aptitude");
        const [targetDate, setTargetDate] = useState("");
        const [hoursPerWeek, setHoursPerWeek] = useState(10);
        const [level, setLevel] = useState("Intermediate");
        const [focus, setFocus] = useState({ quant: true, verbal: true, reasoning: true, gk: false });
        const [plan, setPlan] = useState([]);
        const [planMeta, setPlanMeta] = useState("");

        const weeksToDate = (targetDateStr) => {
          if (!targetDateStr) return 6;
          const t = new Date(targetDateStr + "T00:00:00");
          if (Number.isNaN(t.getTime())) return 6;
          const now = new Date();
          const diffDays = Math.ceil((t - now) / (1000 * 60 * 60 * 24));
          return Math.max(2, Math.min(20, Math.ceil(diffDays / 7)));
        };

        const focusList = useMemo(() => {
          const selected = [];
          if (focus.quant) selected.push("Quantitative");
          if (focus.verbal) selected.push("Verbal");
          if (focus.reasoning) selected.push("Reasoning");
          if (focus.gk) selected.push("General knowledge");
          return selected.length ? selected : ["Core topics"];
        }, [focus]);

        const buildPlan = () => {
          const weeks = weeksToDate(targetDate);
          const intensity = hoursPerWeek <= 6 ? "Light" : hoursPerWeek <= 12 ? "Balanced" : "High";
          const reviewEvery = weeks >= 10 ? 3 : 2;

          setPlanMeta(`${weeks}-week plan • ${hoursPerWeek} hours/week • ${examType} (${level})`);

          const items = [];
          for (let w = 1; w <= weeks; w++) {
            const isReview = w % reviewEvery === 0 || w === weeks;
            const focusLabel = focusList[(w - 1) % focusList.length];
            items.push({
              title: `Week ${w}: ${isReview ? "Revision + Mock" : "Coverage"}`,
              subtitle: isReview
                ? `Full-length practice + error log • Reinforce ${focusLabel}`
                : `${intensity} pace • Deepen ${focusLabel}`,
              badge: isReview ? "Milestone" : "Study",
            });
          }

          setPlan(items);
        };

        useEffect(() => {
          buildPlan();
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, []);

        const onReset = () => {
          setExamType("Competitive Aptitude");
          setTargetDate("");
          setHoursPerWeek(10);
          setLevel("Intermediate");
          setFocus({ quant: true, verbal: true, reasoning: true, gk: false });
          setTimeout(buildPlan, 0);
        };

        return (
          <section id="plan" className="mt-16 scroll-mt-28">
            <div className="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
              <div className="rounded-3xl border border-border bg-white p-6 shadow-soft sm:p-8">
                <div className="flex flex-col gap-2 md:flex-row md:items-end md:justify-between">
                  <div>
                    <h2 className="text-2xl font-semibold tracking-tight text-ink-900">Customizable study plan generator</h2>
                    <p className="mt-2 max-w-2xl text-sm leading-relaxed text-ink-700">
                      Adjust your exam type, target date, and weekly availability. Your plan prioritizes the topics that move your score the most.
                    </p>
                  </div>
                  <p className="text-xs text-ink-700">Tip: Use keyboard navigation — all controls are labeled.</p>
                </div>

                <div className="mt-6 grid gap-6 lg:grid-cols-2">
                  <form
                    className="rounded-2xl border border-border bg-slate-50 p-5"
                    onSubmit={(e) => {
                      e.preventDefault();
                      buildPlan();
                    }}
                  >
                    <div className="grid gap-4 sm:grid-cols-2">
                      <div>
                        <label className="text-sm font-semibold text-ink-900" htmlFor="examType">Exam type</label>
                        <select
                          id="examType"
                          value={examType}
                          onChange={(e) => setExamType(e.target.value)}
                          className="mt-2 w-full rounded-xl border border-border bg-white px-3 py-2 text-sm text-ink-900"
                        >
                          {[
                            "Competitive Aptitude",
                            "Civil Service",
                            "University Entrance",
                            "Language Proficiency",
                            "Professional Licensing",
                          ].map((v) => (
                            <option key={v} value={v}>
                              {v}
                            </option>
                          ))}
                        </select>
                      </div>

                      <div>
                        <label className="text-sm font-semibold text-ink-900" htmlFor="targetDate">Target date</label>
                        <input
                          id="targetDate"
                          type="date"
                          value={targetDate}
                          onChange={(e) => setTargetDate(e.target.value)}
                          className="mt-2 w-full rounded-xl border border-border bg-white px-3 py-2 text-sm text-ink-900"
                        />
                        <p className="mt-1 text-xs text-ink-700">Leave empty to generate a 6-week starter plan.</p>
                      </div>

                      <div>
                        <label className="text-sm font-semibold text-ink-900" htmlFor="hoursPerWeek">Hours per week</label>
                        <input
                          id="hoursPerWeek"
                          type="range"
                          min="3"
                          max="24"
                          value={hoursPerWeek}
                          onChange={(e) => setHoursPerWeek(Number(e.target.value))}
                          className="mt-2 w-full"
                        />
                        <p className="mt-1 text-xs text-ink-700">
                          <span className="font-semibold text-ink-900">{hoursPerWeek}</span> hours/week
                        </p>
                      </div>

                      <div>
                        <label className="text-sm font-semibold text-ink-900" htmlFor="level">Current level</label>
                        <select
                          id="level"
                          value={level}
                          onChange={(e) => setLevel(e.target.value)}
                          className="mt-2 w-full rounded-xl border border-border bg-white px-3 py-2 text-sm text-ink-900"
                        >
                          {["Starter", "Intermediate", "Advanced"].map((v) => (
                            <option key={v} value={v}>
                              {v}
                            </option>
                          ))}
                        </select>
                      </div>
                    </div>

                    <fieldset className="mt-5">
                      <legend className="text-sm font-semibold text-ink-900">Focus areas</legend>
                      <div className="mt-3 grid gap-2 sm:grid-cols-2">
                        {[
                          ["quant", "Quantitative"],
                          ["verbal", "Verbal"],
                          ["reasoning", "Logical reasoning"],
                          ["gk", "General knowledge"],
                        ].map(([k, label]) => (
                          <label key={k} className="flex items-center gap-2 rounded-xl border border-border bg-white px-3 py-2 text-sm text-ink-800">
                            <input
                              type="checkbox"
                              className="h-4 w-4"
                              checked={focus[k]}
                              onChange={(e) => setFocus((p) => ({ ...p, [k]: e.target.checked }))}
                            />
                            {label}
                          </label>
                        ))}
                      </div>
                    </fieldset>

                    <div className="mt-5 flex flex-col gap-3 sm:flex-row sm:items-center">
                      <button
                        type="submit"
                        className="inline-flex items-center justify-center rounded-xl bg-accent-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-accent-700"
                      >
                        Generate plan
                      </button>
                      <button
                        type="button"
                        onClick={onReset}
                        className="inline-flex items-center justify-center rounded-xl border border-border bg-white px-4 py-2.5 text-sm font-semibold text-ink-900 shadow-sm transition-colors hover:bg-slate-50"
                      >
                        Reset
                      </button>
                      <p className="text-xs text-ink-700">No account required to preview.</p>
                    </div>
                  </form>

                  <div className="rounded-2xl border border-border bg-white p-5">
                    <div className="flex items-start justify-between gap-4">
                      <div>
                        <p className="text-sm font-semibold text-ink-900">Your plan preview</p>
                        <p className="mt-1 text-sm text-ink-700">{planMeta || "6-week starter plan • 10 hours/week"}</p>
                      </div>
                      <span className="rounded-full bg-slate-100 px-2 py-1 text-xs font-semibold text-ink-800">Adaptive</span>
                    </div>

                    <ol className="mt-4 grid gap-3">
                      {plan.map((it) => (
                        <li key={it.title} className="rounded-2xl border border-border bg-white p-4">
                          <div className="flex items-start justify-between gap-4">
                            <div>
                              <p className="text-sm font-semibold text-ink-900">{it.title}</p>
                              <p className="mt-1 text-sm text-ink-700">{it.subtitle}</p>
                            </div>
                            <span
                              className={
                                "rounded-full px-2 py-1 text-xs font-semibold " +
                                (it.badge === "Milestone" ? "bg-accent-600 text-white" : "bg-slate-100 text-ink-800")
                              }
                            >
                              {it.badge}
                            </span>
                          </div>
                        </li>
                      ))}
                    </ol>

                    <div className="mt-5 rounded-2xl bg-slate-50 p-4">
                      <p className="text-sm font-semibold text-ink-900">How personalization works</p>

      function App() {
        const [menuOpen, setMenuOpen] = useState(false);
        const [toast, setToast] = useState({ open: false, title: "", message: "" });
        const timerRef = useRef(null);

        const showToast = (title, message) => {
          setToast({ open: true, title, message });
          clearTimeout(timerRef.current);
          timerRef.current = setTimeout(() => setToast((t) => ({ ...t, open: false })), 4500);
        };

        useEffect(() => () => clearTimeout(timerRef.current), []);

        return (
          <>
            <Header isMenuOpen={menuOpen} onToggleMenu={() => setMenuOpen((v) => !v)} onCloseMenu={() => setMenuOpen(false)} />

            <Toast open={toast.open} title={toast.title} message={toast.message} />
